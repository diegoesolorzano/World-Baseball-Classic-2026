name: Update WBC Calendars

on:
  schedule:
    # Every hour during elimination days (March 11-17)
    - cron: "0 * 11-17 3 *"
    # Every 3 hours during pool play (March 5-10)
    - cron: "0 */3 5-10 3 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node src/index.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendars/ data.json
          git diff --staged --quiet || (git commit -m "chore: update calendar data" && git push)
